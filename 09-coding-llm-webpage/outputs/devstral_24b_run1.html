<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar System Visualization</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background-color: black;
    color: white;
  }
  #solarSystem {
    width: 100vw;
    height: 100vh;
    position: relative;
    perspective: 1000px;
  }
  .planet {
    position: absolute;
    border-radius: 50%;
    transition: transform 2s linear, box-shadow 0.3s ease-in-out;
  }
  #sun {
    width: 40px;
    height: 40px;
    background-color: #ffcc00;
    animation: spin 10s infinite linear;
    box-shadow: 0 0 20px 5px rgba(255, 204, 0, 0.8);
  }
  .planet:hover {
    transform: scale(1.2);
    z-index: 2;
  }
  @keyframes spin {
    from { transform: rotateZ(0deg); }
    to { transform: rotateZ(360deg); }
  }
  /* Planet Sizes and Colors */
  #mercury { width: 5px; height: 5px; background-color: gray; }
  #venus { width: 8px; height: 8px; background-color: yellow; }
  #earth { width: 10px; height: 10px; background-color: blue; }
  #mars { width: 7px; height: 7px; background-color: red; }
  #jupiter { width: 20px; height: 20px; background: linear-gradient(45deg, orange, orange); }
  #saturn { width: 18px; height: 18px; background: linear-gradient(45deg, gold, goldenrod); position: relative; }
  #uranus { width: 16px; height: 16px; background-color: cyan; }
  #neptune { width: 15px; height: 15px; background-color: blue; }

  /* Saturn Rings */
  #saturn::after {
    content: "";
    position: absolute;
    top: -20px; left: 50%; transform: translateX(-50%);
    width: 36px; height: 4px;
    background: linear-gradient(90deg, silver, gray);
    border-radius: 10px;
    z-index: -1;
  }

  /* Stars */
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background-color: white;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle {
    to { opacity: 0.5; transform: scale(1.3); }
  }

  /* UI Elements */
  #controls {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 2;
  }
  #infoCard {
    display: none;
    position: absolute;
    bottom: 10px;
    right: 10px;
    background-color: rgba(0, 0, 0, 0.8);
    padding: 10px;
    border-radius: 5px;
    max-width: 300px;
    z-index: 2;
  }
  #planetList {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 200px;
    background-color: rgba(0, 0, 0, 0.8);
    padding: 10px;
    border-radius: 5px;
    z-index: 2;
    max-height: 90vh;
    overflow-y: auto;
  }
</style>
</head>
<body>

<div id="solarSystem">
  <div id="sun" class="planet"></div>
  <div id="mercury" class="planet"></div>
  <div id="venus" class="planet"></div>
  <div id="earth" class="planet"></div>
  <div id="mars" class="planet"></div>
  <div id="jupiter" class="planet"></div>
  <div id="saturn" class="planet"></div>
  <div id="uranus" class="planet"></div>
  <div id="neptune" class="planet"></div>

  <!-- Stars -->
  <div class="star" style="top:10%;left:20%"></div>
  <div class="star" style="top:30%;left:50%"></div>
  <div class="star" style="top:70%;left:60%"></div>
  <div class="star" style="top:90%;left:80%"></div>

</div>

<div id="controls">
  <button onclick="togglePause()">Pause/Play</button>
  <label for="speed">Speed:</label>
  <input type="range" id="speed" name="speed" min="0.5" max="5" step="0.1" value="1">

  <label for="viewToggle">View:</label>
  <select id="viewToggle">
    <option value="perspective">Perspective</option>
    <option value="topdown">Top-Down</option>
  </select>
</div>

<div id="infoCard">
  <h3 id="planetName"></h3>
  <p>Distance from Sun: <span id="distanceFromSun"></span></p>
  <p>Orbital Period: <span id="orbitalPeriod"></span></p>
  <p><strong>Fun Fact:</strong> <span id="funFact"></span></p>
</div>

<div id="planetList">
  <h4>Planets</h4>
  <ul>
    <li onclick="highlightPlanet('mercury')">Mercury</li>
    <li onclick="highlightPlanet('venus')">Venus</li>
    <li onclick="highlightPlanet('earth')">Earth</li>
    <li onclick="highlightPlanet('mars')">Mars</li>
    <li onclick="highlightPlanet('jupiter')">Jupiter</li>
    <li onclick="highlightPlanet('saturn')">Saturn</li>
    <li onclick="highlightPlanet('uranus')">Uranus</li>
    <li onclick="highlightPlanet('neptune')">Neptune</li>
  </ul>
</div>

<script>
  // Planetary data
  const planets = {
    mercury: { name: "Mercury", distance: "57.9 million km", period: "88 days", fact: "Mercury is the smallest planet in our solar system." },
    venus: { name: "Venus", distance: "108.2 million km", period: "225 days", fact: "Venus has the longest day of any planet in our solar system." },
    earth: { name: "Earth", distance: "149.6 million km", period: "365.2 days", fact: "Earth is the only known place where life exists." },
    mars: { name: "Mars", distance: "227.9 million km", period: "687 days", fact: "Mars has the largest volcano in our solar system, Olympus Mons." },
    jupiter: { name: "Jupiter", distance: "778.3 million km", period: "12 years", fact: "Jupiter is twice as large as all the other planets combined." },
    saturn: { name: "Saturn", distance: "1.4 billion km", period: "29 years", fact: "Saturn could float on water due to its low density." },
    uranus: { name: "Uranus", distance: "2.8 billion km", period: "84 years", fact: "Uranus rotates on its side with an axial tilt of 98 degrees." },
    neptune: { name: "Neptune", distance: "4.5 billion km", period: "165 years", fact: "Neptune has the strongest winds in our solar system." }
  };

  // Animation variables
  let animationFrame;
  const speed = document.getElementById('speed');
  let isPaused = false;

  function animate() {
    if (!isPaused) {
      Object.keys(planets).forEach(planet => {
        const element = document.getElementById(planet);
        const orbitDuration = getOrbitDuration(planet);
        element.style.transform =
          `rotateZ(${getAnimationProgress(orbitDuration)}deg)
           translate(${getPlanetDistance(planet)}px)
           rotateZ(${-getAnimationProgress(orbitDuration)}deg)`;
      });
    }
    animationFrame = requestAnimationFrame(animate);
  }

  function getOrbitDuration(planet) {
    switch (planet) {
      case 'mercury': return 88 / speed.value;
      case 'venus': return 225 / speed.value;
      case 'earth': return 365.2 / speed.value;
      case 'mars': return 687 / speed.value;
      case 'jupiter': return 12 * 365 / speed.value;
      case 'saturn': return 29 * 365 / speed.value;
      case 'uranus': return 84 * 365 / speed.value;
      case 'neptune': return 165 * 365 / speed.value;
    }
  }

  function getAnimationProgress(duration) {
    const time = Date.now() / 1000 % duration;
    return (time / duration) * 360;
  }

  function getPlanetDistance(planet) {
    switch (planet) {
      case 'mercury': return 57.9 * speed.value;
      case 'venus': return 108.2 * speed.value;
      case 'earth': return 149.6 * speed.value;
      case 'mars': return 227.9 * speed.value;
      case 'jupiter': return 778.3 * speed.value;
      case 'saturn': return 1400 * speed.value;
      case 'uranus': return 2800 * speed.value;
      case 'neptune': return 4500 * speed.value;
    }
  }

  document.querySelectorAll('.planet').forEach(planet => {
    planet.addEventListener('mouseover', (e) => {
      showPlanetName(e.target.id);
    });
    planet.addEventListener('mouseout', () => {
      hidePlanetInfo();
    });
    planet.addEventListener('click', (e) => {
      displayInfoCard(e.target.id);
    });
  });

  function togglePause() {
    isPaused = !isPaused;
    document.querySelector('button').textContent = isPaused ? 'Play' : 'Pause';
  }

  speed.addEventListener('input', () => {
    const value = parseFloat(speed.value).toFixed(1);
    speed.setAttribute('value', value);
  });

  function showPlanetName(planet) {
    const planetData = planets[planet];
    document.getElementById('infoCard').style.display = 'block';
    document.getElementById('planetName').textContent = `Hovering over ${planetData.name}`;
  }

  function hidePlanetInfo() {
    document.getElementById('infoCard').style.display = 'none';
  }

  function displayInfoCard(planet) {
    const planetData = planets[planet];
    document.getElementById('planetName').textContent = planetData.name;
    document.getElementById('distanceFromSun').textContent = planetData.distance;
    document.getElementById('orbitalPeriod').textContent = planetData.period;
    document.getElementById('funFact').textContent = planetData.fact;
    document.getElementById('infoCard').style.display = 'block';
  }

  function highlightPlanet(planet) {
    const planetElement = document.getElementById(planet);
    if (planetElement) {
      planetElement.style.transform += " scale(1.2)";
      displayInfoCard(planet);

      // Reset transform after a short delay
      setTimeout(() => {
        planetElement.style.transform =
          `rotateZ(${getAnimationProgress(getOrbitDuration(planet))}deg)
           translate(${getPlanetDistance(planet)}px)
           rotateZ(${-getAnimationProgress(getOrbitDuration(planet))}deg)`;
      }, 1000);
    }
  }

  document.getElementById('viewToggle').addEventListener('change', (e) => {
    const solarSystem = document.getElementById('solarSystem');
    if (e.target.value === 'topdown') {
      solarSystem.style.perspective = "none";
    } else {
      solarSystem.style.perspective = "1000px";
    }
  });

  // Start animation
  animate();
</script>

</body>
</html>
