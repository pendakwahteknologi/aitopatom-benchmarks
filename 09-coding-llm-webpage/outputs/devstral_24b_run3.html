<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Solar System Visualization</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
    }
    #stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: -1;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background-color: #fff;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle {
      to { transform: scale(1.2); opacity: 0.8; }
    }
    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      perspective: 1000px;
    }
    .orbit {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center;
      border-radius: 50%;
      opacity: 0.2;
    }
    .orbit-inner {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1px dashed #fff;
      animation: rotateOrbits 360s linear infinite;
    }
    @keyframes rotateOrbits {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .planet {
      position: absolute;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background-color: #fff;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }
    .sun {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 30px;
      height: 30px;
      background: radial-gradient(circle, rgba(255, 165, 0, 1) 0%, rgba(255, 69, 0, 1) 40%);
      border-radius: 50%;
      animation: sunGlow 3s infinite alternate;
    }
    @keyframes sunGlow {
      from { transform: scale(1); box-shadow: 0 0 20px rgba(255, 69, 0, 0.8); }
      to { transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 140, 0, 1); }
    }
    .info-card {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 200px;
      background-color: rgba(0, 0, 0, 0.8);
      padding: 10px;
      border-radius: 5px;
      display: none;
    }
    .info-card h3 {
      margin-top: 0;
    }
    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: rgba(0, 0, 0, 0.8);
      padding: 10px;
      border-radius: 5px;
      z-index: 1;
    }
    #speed-control {
      width: 100%;
    }
    .planet-list {
      position: absolute;
      top: 20px;
      right: 20px;
      background-color: rgba(0, 0, 0, 0.8);
      padding: 10px;
      border-radius: 5px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }
  </style>
</head>
<body>

<div id="stars"></div>
<div id="scene">
  <div class="sun" id="sun"></div>
  <div class="orbit" id="mercury-orbit" style="width: 60px; height: 60px;">
    <div class="orbit-inner"></div>
    <div class="planet" id="mercury" style="background-color: #d3d3d3;"></div>
  </div>
  <div class="orbit" id="venus-orbit" style="width: 100px; height: 100px;">
    <div class="orbit-inner"></div>
    <div class="planet" id="venus" style="background-color: #ffd700;"></div>
  </div>
  <div class="orbit" id="earth-orbit" style="width: 140px; height: 140px;">
    <div class="orbit-inner"></div>
    <div class="planet" id="earth" style="background-color: #6495ed;"></div>
  </div>
  <div class="orbit" id="mars-orbit" style="width: 180px; height: 180px;">
    <div class="orbit-inner"></div>
    <div class="planet" id="mars" style="background-color: #ff4500;"></div>
  </div>
  <div class="orbit" id="jupiter-orbit" style="width: 260px; height: 260px;">
    <div class="orbit-inner"></div>
    <div class="planet" id="jupiter" style="background-color: #ffa500; background-image: linear-gradient(45deg, #ffa500 50%, transparent 50%);"></div>
  </div>
  <div class="orbit" id="saturn-orbit" style="width: 320px; height: 320px;">
    <div class="orbit-inner"></div>
    <div class="planet" id="saturn" style="background-color: #ffa500;">
      <div class="ring" style="position: absolute; width: 18px; height: 4px; background-color: #fff; border-radius: 2px;"></div>
    </div>
  </div>
  <div class="orbit" id="uranus-orbit" style="width: 360px; height: 360px;">
    <div class="orbit-inner"></div>
    <div class="planet" id="uranus" style="background-color: #87ceeb;"></div>
  </div>
  <div class="orbit" id="neptune-orbit" style="width: 400px; height: 400px;">
    <div class="orbit-inner"></div>
    <div class="planet" id="neptune" style="background-color: #1e90ff;"></div>
  </div>
</div>

<div id="controls">
  <button id="pause-play">Pause</button>
  <label for="speed-control">Speed:</label>
  <input type="range" id="speed-control" min="0.5" max="5" step="0.1" value="1">
  <br><br>
  <button id="view-toggle">Top-down View</button>
</div>

<div class="info-card" id="info-card">
  <h3 id="planet-name"></h3>
  <p>Distance from Sun: <span id="distance"></span></p>
  <p>Orbital Period: <span id="orbital-period"></span></p>
  <p>Fun Fact: <span id="fun-fact"></span></p>
</div>

<div class="planet-list">
  <h3>Planets</h3>
  <ul>
    <li><a href="#" data-planet="mercury">Mercury</a></li>
    <li><a href="#" data-planet="venus">Venus</a></li>
    <li><a href="#" data-planet="earth">Earth</a></li>
    <li><a href="#" data-planet="mars">Mars</a></li>
    <li><a href="#" data-planet="jupiter">Jupiter</a></li>
    <li><a href="#" data-planet="saturn">Saturn</a></li>
    <li><a href="#" data-planet="uranus">Uranus</a></li>
    <li><a href="#" data-planet="neptune">Neptune</a></li>
  </ul>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const planets = [
      { id: 'mercury', size: 5, color: '#d3d3d3', distance: '57.9 million km', period: '88 Earth days', fact: 'Mercury is the smallest planet in our solar system.' },
      { id: 'venus', size: 10, color: '#ffd700', distance: '108.2 million km', period: '225 Earth days', fact: 'Venus has the longest day of any planet in our solar system.' },
      { id: 'earth', size: 10, color: '#6495ed', distance: '149.6 million km', period: '365.25 days', fact: 'Earth is the only known planet to support life.' },
      { id: 'mars', size: 7, color: '#ff4500', distance: '227.9 million km', period: '687 Earth days', fact: 'Mars has the highest volcano in the solar system, Olympus Mons.' },
      { id: 'jupiter', size: 15, color: '#ffa500', distance: '778.3 million km', period: '12 years', fact: 'Jupiter has the shortest day of all planets in our solar system.' },
      { id: 'saturn', size: 12, color: '#ffa500', distance: '1.4 billion km', period: '29 years', fact: 'Saturn is the least dense planet in our solar system.' },
      { id: 'uranus', size: 10, color: '#87ceeb', distance: '2.9 billion km', period: '84 years', fact: 'Uranus rotates on its side, with an axial tilt of 98 degrees.' },
      { id: 'neptune', size: 10, color: '#1e90ff', distance: '4.5 billion km', period: '165 years', fact: 'Neptune has the strongest winds in our solar system.' }
    ];

    const speedControl = document.getElementById('speed-control');
    let animationSpeed = parseFloat(speedControl.value);
    let isPaused = false;
    let perspectiveView = true;

    // Create stars
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      star.style.left = Math.random() * 100 + 'vw';
      star.style.top = Math.random() * 100 + 'vh';
      star.style.animationDuration = Math.random() * 3 + 2 + 's';
      document.getElementById('stars').appendChild(star);
    }

    // Set up planet animations
    planets.forEach(planet => {
      const orbit = document.getElementById(`${planet.id}-orbit`);
      const planetElem = document.getElementById(planet.id);

      // Set initial position
      planetElem.style.width = `${planet.size}px`;
      planetElem.style.height = `${planet.size}px`;

      // Add hover effect
      planetElem.addEventListener('mouseover', () => {
        planetElem.style.transform = 'scale(1.2)';
        document.getElementById('info-card').style.display = 'block';
        document.getElementById('planet-name').textContent = planet.id.charAt(0).toUpperCase() + planet.id.slice(1);
      });

      planetElem.addEventListener('mouseout', () => {
        planetElem.style.transform = 'scale(1)';
        if (!planetElem.classList.contains('highlight')) {
          document.getElementById('info-card').style.display = 'none';
        }
      });

      // Add click effect
      planetElem.addEventListener('click', () => {
        planetElem.classList.toggle('highlight');
        document.getElementById('distance').textContent = planet.distance;
        document.getElementById('orbital-period').textContent = planet.period;
        document.getElementById('fun-fact').textContent = planet.fact;

        planets.forEach(p => {
          if (p.id !== planet.id) {
            document.getElementById(p.id).classList.remove('highlight');
          }
        });
      });

      // Add animation
      const orbitDuration = 360 / planet.size * animationSpeed;
      planetElem.style.animation = `orbit${planet.id.charAt(0).toUpperCase() + planet.id.slice(1)} ${orbitDuration}s linear infinite`;

      // Create keyframes for each planet's orbit
      const style = document.createElement('style');
      style.innerHTML = `
        @keyframes orbit${planet.id.charAt(0).toUpperCase() + planet.id.slice(1)} {
          from { transform: rotate(0deg) translate(${orbit.offsetWidth / 2}px) rotate(0deg); }
          to { transform: rotate(360deg) translate(${orbit.offsetWidth / 2}px) rotate(0deg); }
        }
      `;
      document.head.appendChild(style);
    });

    // Speed control
    speedControl.addEventListener('input', () => {
      animationSpeed = parseFloat(speedControl.value);

      planets.forEach(planet => {
        const planetElem = document.getElementById(planet.id);
        const orbitDuration = 360 / planet.size * animationSpeed;
        planetElem.style.animation = `orbit${planet.id.charAt(0).toUpperCase() + planet.id.slice(1)} ${orbitDuration}s linear infinite`;
      });
    });

    // Pause/play control
    document.getElementById('pause-play').addEventListener('click', () => {
      isPaused = !isPaused;
      const button = document.getElementById('pause-play');

      if (isPaused) {
        button.textContent = 'Play';
        planets.forEach(planet => {
          document.getElementById(planet.id).style.animationPlayState = 'paused';
        });
      } else {
        button.textContent = 'Pause';
        planets.forEach(planet => {
          document.getElementById(planet.id).style.animationPlayState = 'running';
        });
      }
    });

    // View toggle
    document.getElementById('view-toggle').addEventListener('click', () => {
      perspectiveView = !perspectiveView;
      const button = document.getElementById('view-toggle');
      const scene = document.getElementById('scene');

      if (perspectiveView) {
        button.textContent = 'Top-down View';
        scene.style.perspective = '1000px';
      } else {
        button.textContent = 'Perspective View';
        scene.style.perspective = 'none';
      }
    });

    // Planet list highlighting
    document.querySelectorAll('.planet-list a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const planetId = e.target.dataset.planet;
        planets.forEach(planet => {
          if (planet.id === planetId) {
            document.getElementById(planet.id).classList.add('highlight');
            document.getElementById('info-card').style.display = 'block';
            document.getElementById('planet-name').textContent = planet.id.charAt(0).toUpperCase() + planet.id.slice(1);
            document.getElementById('distance').textContent = planet.distance;
            document.getElementById('orbital-period').textContent = planet.period;
            document.getElementById('fun-fact').textContent = planet.fact;
          } else {
            document.getElementById(planet.id).classList.remove('highlight');
          }
        });
      });
    });
  });
</script>

</body>
</html>
