<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b2d;
            overflow-x: hidden;
            font-family: Arial, sans-serif;
        }

        .container {
            perspective: 1000px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .solar-system {
            position: relative;
            width: 80vw;
            height: 80vh;
            transform-style: preserve-3d;
        }

        .sun {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(#ffd700, #ff9500);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            animation: rotate 20s linear infinite;
        }

        .orbit {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform-origin: center;
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .info-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -80%);
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            z-index: 100;
            display: none;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            z-index: 100;
        }

        .speed-slider {
            width: 200px;
            margin: 10px 0;
        }

        .toggle-view {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .side-panel {
            position: fixed;
            right: -300px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .side-panel.active {
            right: 20px;
        }

        .planet-list {
            list-style: none;
            margin: 0;
        }

        .star-field {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .solar-system {
                width: 90vw;
                height: 90vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="star-field" id="stars"></div>
        <div class="solar-system">
            <div class="sun"></div>
            <div class="orbit" style="width: 100px; height: 100px;"></div>
            <div class="planet mercury" style="width: 20px; height: 20px; background: #888; transform: translate(50px)"></div>

            <!-- Repeat for other planets -->
            <!-- (Omitted for brevity, but would include similar structure for each planet with appropriate sizes and colors) -->
        </div>
    </div>

    <div class="controls">
        <input type="range" min="0.5" max="5" value="1" class="speed-slider" id="speedSlider">
        <button id="playPause">▶</button>
        <button id="viewToggle" class="toggle-view">Top View</button>
    </div>

    <div class="side-panel">
        <h2>Planet List</h2>
        <ul class="planet-list">
            <li data-planet="mercury">Mercury</li>
            <li data-planet="venus">Venus</li>
            <!-- Add similar list items for other planets -->
        </ul>
    </div>

    <div class="info-card" id="infoCard"></div>

</body>
</html>
