<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b2d;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
            position: relative;
            min-height: 100vh;
        }

        .solar-system {
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--freq) ease-in-out infinite;
        }

        .sun {
            width: 4rem;
            height: 4rem;
            background: radial-gradient(#ffd700, #ff8c00);
            border-radius: 50%;
            box-shadow: 0 0 60px #ff8c00;
            animation: sunGlow 3s ease-in-out infinite;
        }

        .orbit {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform-origin: center;
            pointer-events: none;
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .info-panel {
            position: fixed;
            left: 20px;
            top: 20px;
            background: rgba(18, 18, 47, 0.9);
            padding: 20px;
            border-radius: 10px;
            color: white;
            z-index: 10;
        }

        .speed-control {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        @keyframes orbit {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes sunGlow {
            0%, 100% { box-shadow: 0 0 60px #ff8c00; }
            50% { box-shadow: 0 0 80px #ff8c00, 0 0 120px rgba(255, 140, 0, 0.7); }
        }

        .highlight {
            transform: scale(1.2);
            filter: brightness(1.2);
        }

        .info-card {
            position: fixed;
            background: rgba(18, 18, 47, 0.95);
            padding: 20px;
            border-radius: 10px;
            color: white;
            z-index: 100;
            transform: translate(-150%, -50%);
            transition: all 0.3s ease;
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 100%;
            width: 20px;
            height: 20px;
            background: rgba(18, 18, 47, 0.9);
            transform: rotate(-45deg);
        }

        .toggle-view {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px;
            background: rgba(18, 18, 47, 0.9);
            border-radius: 5px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .info-panel {
                left: -20px;
                transform: translateX(-100%);
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="solar-system">
        <div class="sun" id="sun"></div>
        
        <div class="orbit" id="mercury-orbit"></div>
        <div class="orbit" id="venus-orbit"></div>
        <div class="orbit" id="earth-orbit"></div>
        <div class="orbit" id="mars-orbit"></div>
        <div class="orbit" id="jupiter-orbit"></div>
        <div class="orbit" id="saturn-orbit"></div>
        <div class="orbit" id="uranus-orbit"></div>
        <div class="orbit" id="neptune-orbit"></div>

        <div class="planet" id="mercury"></div>
        <div class="planet" id="venus"></div>
        <div class="planet" id="earth"></div>
        <div class="planet" id="mars"></div>
        <div class="planet" id="jupiter"></div>
        <div class="planet" id="saturn"></div>
        <div class="planet" id="uranus"></div>
        <div class="planet" id="neptune"></div>
    </div>

    <div class="info-panel">
        <h2>Solar System</h2>
        <ul id="planet-list" class="list">
            <li data-name="Mercury">Mercury</li>
            <li data-name="Venus">Venus</li>
            <li data-name="Earth">Earth</li>
            <li data-name="Mars">Mars</li>
            <li data-name="Jupiter">Jupiter</li>
            <li data-name="Saturn">Saturn</li>
            <li data-name="Uranus">Uranus</li>
            <li data-name="Neptune">Neptune</li>
        </ul>
    </div>

    <div class="speed-control">
        <input type="range" min="0.5" max="5" value="1" id="speed">
        <button id="playPause">▶</button>
        <button class="toggle-view" id="viewToggle">Top View</button>
    </div>

    <script>
        const planets = [
            { name: 'Mercury', color: '#888', size: 0.3, distance: 70, period: 88 },
            { name: 'Venus', color: '#ffff00', size: 0.9, distance: 140, period: 225 },
            { name: 'Earth', color: '#4CAF50', size: 1.2, distance: 200, period: 365 },
            { name: 'Mars', color: '#ff6b6b', size: 0.7, distance: 280, period: 687 },
            { name: 'Jupiter', color: '#ff9f43', size: 1.8, distance: 380, period: 4333 },
            { name: 'Saturn', color: '#ffd700', size: 1.5, distance: 520, period: 10759 },
            { name: 'Uranus', color: '#00ffff', size: 1.4, distance: 680, period: 30687 },
            { name: 'Neptune', color: '#0000ff', size: 1.3, distance: 790, period: 60190 }
        ];

        const solarSystem = document.querySelector('.solar-system');
        const sun = document.getElementById('sun');
        const planetElements = {};
        let isPlaying = true;
        let speedMultiplier = 1;

        // Create stars
        function createStars() {
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--freq', Math.random() * 2 + 1 + 's');
                document.getElementById('stars').appendChild(star);
            }
        }

        // Initialize planets
        function initPlanets() {
            planets.forEach((planet, index) => {
                const orbit = document.createElement('div');
                orbit.className = 'orbit';
                orbit.style.transform = `rotateY(${index * 45}deg)`;
                orbit.id = `${planet.name.toLowerCase()}-orbit`;

                const planetEl = document.createElement('div');
                planetEl.className = 'planet';
                planetEl.id = planet.name.toLowerCase();
                planetEl.style.width = `${planet.size}%`;
                planetEl.style.height = `${planet.size}%`;
                planetEl.style.backgroundColor = planet.color;
                planetElements[planet.name.toLowerCase()] = planetEl;

                solarSystem.appendChild(orbit);
                solarSystem.appendChild(planetEl);
            });
        }

        // Set up animations
        function setupAnimations() {
            Object.entries(planetElements).forEach(([name, element]) => {
                const period = planets.find(p => p.name.toLowerCase() === name)?.period;
                const animationDelay = (index * 45) / 60; // Adjust orbital speed based on distance
                
                element.style.animation = `orbit ${period * speedMultiplier * 2}ms linear infinite`;
            });
        }

        // Event listeners
        function addEventListeners() {
            // Click handlers for info cards
            Object.entries(planetElements).forEach(([name, el]) => {
                el.addEventListener('click', () => showInfoCard(name));
                el.addEventListener('mouseover', () => highlightPlanet(name));
                el.addEventListener('mouseout', () => unhighlightPlanet(name));
            });

            document.getElementById('playPause').addEventListener('click', togglePlay);
            document.getElementById('speed').addEventListener('input', (e) => {
                speedMultiplier = e.target.value;
                updateSpeed();
            });
            document.getElementById('viewToggle').addEventListener('click', toggleView);

            // Responsive handling
            window.addEventListener('resize', adjustPositions);
        }

        function showInfoCard(planetName) {
            const infoCard = document.createElement('div');
            const planetData = planets.find(p => p.name.toLowerCase() === planetName.toLowerCase());
            
            infoCard.className = 'info-card';
            infoCard.innerHTML = `
                <h3>${planetData.name}</h3>
                <p>Distance: ${Math.round(planetData.distance / 10)} million km</p>
                <p>Orbital Period: ${Math.round(planetData.period)} days</p>
                <p>Fun Fact: ${getRandomFact()}</p>
            `;
            
            document.body.appendChild(infoCard);
        }

        // Helper functions (omitted for brevity)
    </script>
</body>
</html>
