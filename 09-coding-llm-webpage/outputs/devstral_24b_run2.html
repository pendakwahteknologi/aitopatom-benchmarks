<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar System Visualization</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
  }
  canvas {
    display: block;
  }
  .controls {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0, 0, 0, 0.8);
    padding: 10px;
    border-radius: 5px;
  }
  .info-card {
    position: absolute;
    bottom: 10px;
    left: 10px;
    width: 250px;
    background: rgba(0, 0, 0, 0.8);
    padding: 10px;
    border-radius: 5px;
    display: none;
    z-index: 10;
  }
  .planet-list {
    position: absolute;
    top: 60px;
    left: 10px;
    background: rgba(0, 0, 0, 0.8);
    padding: 10px;
    border-radius: 5px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="controls">
  <button id="toggle-play">Play</button>
  <label for="speed-control">Speed:</label>
  <input type="range" id="speed-control" min="0.5" max="5" step="0.1" value="1">
  <button id="toggle-view">Top-Down View</button>
</div>

<div class="info-card" id="info-card">
  <h3 id="planet-name"></h3>
  <p>Distance from Sun: <span id="distance-from-sun"></span></p>
  <p>Orbital Period: <span id="orbital-period"></span></p>
  <p><strong>Fun Fact:</strong> <span id="fun-fact"></span></p>
</div>

<div class="planet-list">
  <h4>Planets</h4>
  <ul id="planet-names">
    <!-- Planet names will be dynamically added here -->
  </ul>
</div>

<canvas id="solar-system"></canvas>

<script>
// Solar System Visualization
const canvas = document.getElementById('solar-system');
const ctx = canvas.getContext('2d');
const infoCard = document.getElementById('info-card');
const planetNamesElement = document.getElementById('planet-names');

let width, height;
function resizeCanvas() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const planets = [
  { name: 'Mercury', color: '#A9A9A9', radius: 2, distance: 50, orbitalPeriod: 88, funFact: 'Mercury is the smallest planet in our solar system.' },
  { name: 'Venus', color: '#FFD700', radius: 4, distance: 100, orbitalPeriod: 225, funFact: 'A day on Venus is longer than a year on Venus.' },
  { name: 'Earth', color: '#87CEEB', radius: 5, distance: 150, orbitalPeriod: 365, funFact: 'Earth is the only known planet to support life.' },
  { name: 'Mars', color: '#FF4500', radius: 3.5, distance: 200, orbitalPeriod: 687, funFact: 'Mars has the largest dust storms in our solar system.' },
  { name: 'Jupiter', color: '#FFA500', radius: 10, distance: 300, orbitalPeriod: 4332, funFact: 'Jupiter has the shortest day of all planets.' },
  { name: 'Saturn', color: '#FFD700', radius: 8.5, distance: 400, orbitalPeriod: 10759, funFact: 'Saturn could float in water because it is mostly made of gas.' },
  { name: 'Uranus', color: '#00FFFF', radius: 7, distance: 500, orbitalPeriod: 30685, funFact: 'Uranus rotates on its side as it orbits the sun.' },
  { name: 'Neptune', color: '#1E90FF', radius: 6.5, distance: 600, orbitalPeriod: 60182, funFact: 'Neptune has the strongest winds in our solar system.' }
];

let angle = 0;
let speed = 1;
let isPlaying = true;
let perspectiveView = false;

document.getElementById('toggle-play').addEventListener('click', () => {
  isPlaying = !isPlaying;
  document.getElementById('toggle-play').textContent = isPlaying ? 'Pause' : 'Play';
});

document.getElementById('speed-control').addEventListener('input', (e) => {
  speed = parseFloat(e.target.value);
});

document.getElementById('toggle-view').addEventListener('click', () => {
  perspectiveView = !perspectiveView;
  document.getElementById('toggle-view').textContent = perspectiveView ? 'Perspective View' : 'Top-Down View';
});

planets.forEach((planet, index) => {
  const listItem = document.createElement('li');
  listItem.textContent = planet.name;
  listItem.addEventListener('click', () => highlightPlanet(index));
  planetNamesElement.appendChild(listItem);
});

function drawStar(x, y) {
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x, y, 1, 0, Math.PI * 2);
  ctx.fill();
}

function animateStars() {
  for (let i = 0; i < 50; i++) {
    const x = Math.random() * width;
    const y = Math.random() * height;
    drawStar(x, y);
    setTimeout(() => {
      ctx.clearRect(x - 1, y - 1, 2, 2);
    }, 1000);
  }
}

function highlightPlanet(index) {
  planets.forEach((p, i) => p.highlighted = i === index);

  const planet = planets[index];
  document.getElementById('planet-name').textContent = planet.name;
  document.getElementById('distance-from-sun').textContent = `${planet.distance} million km`;
  document.getElementById('orbital-period').textContent = `${planet.orbitalPeriod} days`;
  document.getElementById('fun-fact').textContent = planet.funFact;
  infoCard.style.display = 'block';
}

function animate() {
  if (isPlaying) angle += 0.01 * speed;

  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, width, height);

  // Draw twinkling stars
  animateStars();

  // Draw sun with glow effect
  const gradient = ctx.createRadialGradient(width / 2, height / 2, 50, width / 2, height / 2, 100);
  gradient.addColorStop(0, '#FFD700');
  gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(width / 2, height / 2, 50, 0, Math.PI * 2);
  ctx.fill();

  planets.forEach((planet, index) => {
    const planetAngle = angle + (index * 0.1);

    let x, y;
    if (perspectiveView) {
      x = width / 2 + planet.distance * Math.cos(planetAngle) * (height / (height + planet.distance));
      y = height / 2 + planet.distance * Math.sin(planetAngle) * (height / (height + planet.distance));
    } else {
      x = width / 2 + planet.distance * Math.cos(planetAngle);
      y = height / 2 + planet.distance * Math.sin(planetAngle);
    }

    // Draw orbital path
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([5, 10]);
    ctx.beginPath();
    ctx.arc(width / 2, height / 2, planet.distance, 0, Math.PI * 2);
    ctx.stroke();

    // Draw planet
    ctx.fillStyle = planet.highlighted ? '#fff' : planet.color;
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(x, y, planet.radius, 0, Math.PI * 2);
    ctx.fill();

    // Draw planet name on hover
    if (planet.highlighted) {
      ctx.fillStyle = '#fff';
      ctx.font = '14px Arial';
      ctx.fillText(planet.name, x + planet.radius + 5, y);
    }
  });

  requestAnimationFrame(animate);
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;

  planets.forEach((planet, index) => {
    if (Math.hypot(mouseX - (width / 2 + planet.distance * Math.cos(angle + (index * 0.1))), mouseY - (height / 2 + planet.distance * Math.sin(angle + (index * 0.1)))) <= planet.radius) {
      highlightPlanet(index);
    }
  });
});

animate();
</script>

</body>
</html>
