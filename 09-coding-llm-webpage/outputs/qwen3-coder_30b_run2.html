<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Solar System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            perspective: 1000px;
        }

        #solar-system {
            position: relative;
            width: 100%;
            height: 100vh;
            transform-style: preserve-3d;
        }

        .sun {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ffd700, #ff8c00, #ff4500);
            border-radius: 50%;
            box-shadow: 0 0 50px #ff4500, 0 0 100px #ff8c00;
            animation: sunGlow 3s ease-in-out infinite alternate;
            z-index: 10;
        }

        @keyframes sunGlow {
            0% { box-shadow: 0 0 50px #ff4500, 0 0 100px #ff8c00; }
            100% { box-shadow: 0 0 70px #ff4500, 0 0 140px #ff8c00; }
        }

        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform-style: preserve-3d;
            transform: translate(-50%, -50%) rotateX(75deg);
        }

        .planet {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 50%;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .planet:hover {
            transform: scale(1.2);
            z-index: 20;
        }

        .planet-info {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .planet-info.visible {
            opacity: 1;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-size: 14px;
        }

        .control-group input {
            width: 100px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            width: 250px;
            border-radius: 10px;
            padding: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .panel h2 {
            margin-bottom: 15px;
            text-align: center;
        }

        .planet-list {
            list-style: none;
        }

        .planet-list li {
            padding: 8px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .planet-list li:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .planet-list li.highlight {
            background: rgba(255, 255, 255, 0.3);
        }

        .planet-color {
            width: 15px;
            height: 15px;
            border-radius: 50%;
        }

        .info-card {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 10px;
            max-width: 300px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
            display: none;
        }

        .info-card h3 {
            margin-bottom: 10px;
        }

        .info-card p {
            margin: 5px 0;
            font-size: 14px;
        }

        .info-card.show {
            display: block;
        }

        .info-card .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        .view-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .controls {
                bottom: 10px;
                left: 10px;
                padding: 10px;
                font-size: 12px;
            }
            
            .panel {
                width: 200px;
                top: 10px;
                right: 10px;
                padding: 10px;
            }
            
            .info-card {
                max-width: 250px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="solar-system">
        <div class="stars" id="stars"></div>
        <div class="sun" id="sun"></div>
        <div class="orbit" id="orbit1"></div>
        <div class="orbit" id="orbit2"></div>
        <div class="orbit" id="orbit3"></div>
        <div class="orbit" id="orbit4"></div>
        <div class="orbit" id="orbit5"></div>
        <div class="orbit" id="orbit6"></div>
        <div class="orbit" id="orbit7"></div>
        <div class="orbit" id="orbit8"></div>
        <div class="planet" id="mercury"></div>
        <div class="planet" id="venus"></div>
        <div class="planet" id="earth"></div>
        <div class="planet" id="mars"></div>
        <div class="planet" id="jupiter"></div>
        <div class="planet" id="saturn"></div>
        <div class="planet" id="uranus"></div>
        <div class="planet" id="neptune"></div>
        <div class="planet-info" id="planet-info"></div>
        <div class="info-card" id="info-card">
            <button class="close-btn" onclick="document.getElementById('info-card').classList.remove('show')">×</button>
            <h3 id="info-title"></h3>
            <p>Distance from Sun: <span id="info-distance"></span></p>
            <p>Orbital Period: <span id="info-period"></span></p>
            <p>Fun Fact: <span id="info-fact"></span></p>
        </div>
        <div class="view-toggle" onclick="toggleView()">Toggle View</div>
        <div class="controls">
            <div class="control-group">
                <label for="speed">Speed:</label>
                <input type="range" id="speed" min="0.5" max="5" step="0.5" value="1">
                <span id="speed-value">1x</span>
            </div>
            <div class="control-group">
                <button class="control-btn" id="pause-btn">Pause</button>
                <button class="control-btn" id="reset-btn">Reset</button>
            </div>
        </div>
        <div class="panel">
            <h2>Planets</h2>
            <ul class="planet-list" id="planet-list">
                <li data-planet="mercury"><span class="planet-color" style="background: #8C7853;"></span> Mercury</li>
                <li data-planet="venus"><span class="planet-color" style="background: #FFC649;"></span> Venus</li>
                <li data-planet="earth"><span class="planet-color" style="background: #6B93D6;"></span> Earth</li>
                <li data-planet="mars"><span class="planet-color" style="background: #C1440E;"></span> Mars</li>
                <li data-planet="jupiter"><span class="planet-color" style="background: #D8CA9D;"></span> Jupiter</li>
                <li data-planet="saturn"><span class="planet-color" style="background: #FAD5A5;"></span> Saturn</li>
                <li data-planet="uranus"><span class="planet-color" style="background: #5BFBFF;"></span> Uranus</li>
                <li data-planet="neptune"><span class="planet-color" style="background: #4B70DD;"></span> Neptune</li>
            </ul>
        </div>
    </div>

    <script>
        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.width = `${Math.random() * 3}px`;
            star.style.height = star.style.width;
            star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
            starsContainer.appendChild(star);
        }

        // Planet data
        const planets = [
            {
                name: "Mercury",
                size: 8,
                distance: 80,
                period: 0.24,
                color: "#8C7853",
                fact: "Mercury is the smallest planet and closest to the Sun."
            },
            {
                name: "Venus",
                size: 12,
                distance: 110,
                period: 0.62,
                color: "#FFC649",
                fact: "Venus is the hottest planet with a thick, toxic atmosphere."
            },
            {
                name: "Earth",
                size: 14,
                distance: 150,
                period: 1,
                color: "#6B93D6",
                fact: "Earth is the only planet known to support life."
            },
            {
                name: "Mars",
                size: 10,
                distance: 190,
                period: 1.88,
                color: "#C1440E",
                fact: "Mars is known as the Red Planet due to iron oxide on its surface."
            },
            {
                name: "Jupiter",
                size: 30,
                distance: 250,
                period: 11.86,
                color: "#D8CA9D",
                fact: "Jupiter is the largest planet in our solar system."
            },
            {
                name: "Saturn",
                size: 25,
                distance: 320,
                period: 29.46,
                color: "#FAD5A5",
                fact: "Saturn has prominent rings made of ice and rock particles."
            },
            {
                name: "Uranus",
                size: 18,
                distance: 380,
                period: 84.01,
                color: "#5BFBFF",
                fact: "Uranus rotates on its side, making it unique among planets."
            },
            {
                name: "Neptune",
                size: 17,
                distance: 440,
                period: 164.8,
                color: "#4B70DD",
                fact: "Neptune is the windiest planet with speeds up to 2,100 km/h."
            }
        ];

        // Create orbits and planets
        const sun = document.getElementById('sun');
        const planetElements = {};
        const orbitElements = {};

        planets.forEach((planet, index) => {
            const orbit = document.getElementById(`orbit${index + 1}`);
            orbit.style.width = `${planet.distance * 2}px`;
            orbit.style.height = `${planet.distance * 2}px`;
            orbitElements[index] = orbit;

            const planetEl = document.getElementById(planet.name.toLowerCase());
            planetEl.style.width = `${planet.size}px`;
            planetEl.style.height = `${planet.size}px`;
            planetEl.style.background = planet.color;
            planetEl.dataset.planet = planet.name.toLowerCase();
            planetElements[planet.name.toLowerCase()] = planetEl;

            // Add Saturn's rings
            if (planet.name === "Saturn") {
                const rings = document.createElement('div');
                rings.style.position = 'absolute';
                rings.style.width = `${planet.size * 2.5}px`;
                rings.style.height = `${planet.size * 2.5}px`;
                rings.style.border = '2px solid rgba(255, 255, 255, 0.6)';
                rings.style.borderRadius = '50%';
                rings.style.top = '50%';
                rings.style.left = '50%';
                rings.style.transform = 'translate(-50%, -50%)';
                rings.style.transformStyle = 'preserve-3d';
                planetEl.appendChild(rings);
            }
        });

        // Animation control
        let animationSpeed = 1;
        let isPaused = false;
        let isPerspectiveView = true;

        document.getElementById('speed').addEventListener('input', (e) => {
            animationSpeed = parseFloat(e.target.value);
            document.getElementById('speed-value').textContent = `${animationSpeed}x`;
        });

        document.getElementById('pause-btn').addEventListener('click', () => {
            isPaused = !isPaused;
            document.getElementById('pause-btn').textContent = isPaused ? 'Play' : 'Pause';
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            animationSpeed = 1;
            isPaused = false;
            document.getElementById('speed').value = 1;
            document.getElementById('speed-value').textContent = '1x';
            document.getElementById('pause-btn').textContent = 'Pause';
        });

        function toggleView() {
            isPerspectiveView = !isPerspectiveView;
            const orbits = document.querySelectorAll('.orbit');
            orbits.forEach(orbit => {
                orbit.style.transform = `translate(-50%, -50%) rotateX(${isPerspectiveView ? '75deg' : '0deg'})`;
            });
        }

        // Planet interaction
        const planetList = document.getElementById('planet-list');
        const planetInfo = document.getElementById('planet-info');
        const infoCard = document.getElementById('info-card');

        planetList.addEventListener('click', (e) => {
            const planetItem = e.target.closest('li');
            if (planetItem) {
                const planetName = planetItem.dataset.planet;
                showPlanetInfo(planetName);
            }
        });

        function showPlanetInfo(planetName) {
            const planet = planets.find(p => p.name.toLowerCase() === planetName);
            if (!planet) return;

            // Highlight planet in list
            document.querySelectorAll('.planet-list li').forEach(item => {
                item.classList.remove('highlight');
            });
            const highlightedItem = document.querySelector(`[data-planet="${planetName}"]`);
            if (highlightedItem) {
                highlightedItem.classList.add('highlight');
            }

            // Show info card
            document.getElementById('info-title').textContent = planet.name;
            document.getElementById('info-distance').textContent = `${planet.distance} million km`;
            document.getElementById('info-period').textContent = `${planet.period} Earth years`;
            document.getElementById('info-fact').textContent = planet.fact;
            infoCard.classList.add('show');

            // Position info card near planet
            const planetEl = planetElements[planetName];
            const rect = planetEl.getBoundingClientRect();
            const containerRect = document.getElementById('solar-system').getBoundingClientRect();
            
            infoCard.style.left = `${rect.left - containerRect.left + rect.width/2 - 150}px`;
            infoCard.style.top = `${rect.top - containerRect.top - 120}px`;
        }

        // Animation loop
        let time = 0;

        function animate() {
            if (!isPaused) {
                time += 0.01 * animationSpeed;
                
                planets.forEach((planet, index) => {
                    const orbit = orbitElements[index];
                    const planetEl = planetElements[planet.name.toLowerCase()];
                    
                    const angle = time * (1 / planet.period);
                    const x = Math.cos(angle) * planet.distance;
                    const y = Math.sin(angle) * planet.distance;
                    
                    planetEl.style.transform = `translate(${x}px, ${y}px)`;
                });
            }
            
            requestAnimationFrame(animate);
        }

        animate();

        // Add hover effects
        document.querySelectorAll('.planet').forEach(planet => {
            planet.addEventListener('mouseenter', (e) => {
                const planetName = e.target.dataset.planet;
                const planetData = planets.find(p => p.name.toLowerCase() === planetName);
                
                planetInfo.textContent = planetData.name;
                planetInfo.style.left = `${e.clientX + 10}px`;
                planetInfo.style.top = `${e.clientY + 10}px`;
                planetInfo.classList.add('visible');
            });
            
            planet.addEventListener('mouseleave', () => {
                planetInfo.classList.remove('visible');
            });
            
            planet.addEventListener('click', (e) => {
                const planetName = e.target.dataset.planet;
                showPlanetInfo(planetName);
            });
        });
    </script>
</body>
</html>
