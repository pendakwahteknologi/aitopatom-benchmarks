<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #0b0b2d;
            overflow-x: hidden;
            font-family: Arial, sans-serif;
        }

        .container {
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #solar-system {
            position: relative;
            width: 80vw;
            height: 80vh;
            transform-style: preserve-3d;
        }

        .sun {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 50px #ff6b00;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .planet {
            position: absolute;
            transform-style: preserve-3d;
        }

        .orbital-path {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .info-card {
            position: fixed;
            top: 20px;
            right: -300px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            transition: right 0.3s ease;
            z-index: 100;
        }

        .info-card.active {
            right: 20px;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            z-index: 99;
        }

        .speed-control {
            margin: 10px 0;
        }

        .toggle-view {
            margin-top: 10px;
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite random();
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .ui-panel {
            position: fixed;
            right: -300px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            list-style: none;
            z-index: 99;
        }

        .ui-panel.active {
            right: 20px;
        }

        .planet-list li {
            cursor: pointer;
            padding: 10px;
            transition: background 0.3s ease;
        }

        .planet-list li:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="solar-system">
            <div class="stars" id="star-field"></div>
            <div class="sun"></div>
        </div>
    </div>

    <div class="controls">
        <input type="range" min="0.5" max="5" value="1" class="speed-control" id="speedSlider">
        <button id="playPause">▶</button>
        <button class="toggle-view">Top View</button>
    </div>

    <ul class="ui-panel planet-list" id="planetList"></ul>

    <div class="info-card" id="infoCard"></div>

    <script>
        const planets = [
            { name: 'Mercury', color: '#888', size: 10, distance: 70, period: 88 },
            { name: 'Venus', color: '#ffd700', size: 15, distance: 100, period: 225 },
            { name: 'Earth', color: '#4169e1', size: 16, distance: 140, period: 365 },
            { name: 'Mars', color: '#ff0000', size: 12, distance: 180, period: 687 },
            { name: 'Jupiter', color: '#dAA36C', size: 30, distance: 240, period: 4333 },
            { name: 'Saturn', color: '#f4a460', size: 25, distance: 320, period: 10759 },
            { name: 'Uranus', color: '#87CEEB', size: 20, distance: 380, period: 30687 },
            { name: 'Neptune', color: '#4682b4', size: 19, distance: 440, period: 60190 }
        ];

        const solarSystem = document.getElementById('solar-system');
        const planetList = document.getElementById('planetList');
        let isAnimating = true;
        let speedMultiplier = 1;

        function createSolarSystem() {
            planets.forEach((planet, index) => {
                // Create orbital path
                const orbitalPath = document.createElement('div');
                orbitalPath.className = 'orbital-path';
                orbitalPath.style.width = `${planet.distance * 2}px`;
                orbitalPath.style.height = `${planet.distance * 2}px`;
                solarSystem.appendChild(orbitalPath);

                // Create planet
                const planetDiv = document.createElement('div');
                planetDiv.className = `planet ${planet.name.toLowerCase()}`;
                planetDiv.style.width = `${planet.size}px`;
                planetDiv.style.height = `${planet.size}px`;
                planetDiv.style.backgroundColor = planet.color;
                solarSystem.appendChild(planetDiv);

                // Add hover effect
                planetDiv.addEventListener('mouseover', () => {
                    planetDiv.style.transform = 'scale(1.2)';
                    planetDiv.style.transition = 'transform 0.3s ease';
                });

                planetDiv.addEventListener('mouseout', () => {
                    planetDiv.style.transform = '';
                });
            });
        }

        function animatePlanets() {
            if (!isAnimating) return;

            const elements = document.querySelectorAll('.planet');
            
            elements.forEach((element, index) => {
                const angle = (Date.now() * speedMultiplier) % 360;
                const distance = planets[index].distance;
                
                element.style.transform = `rotate(${angle}deg) scale(${speedMultiplier})`;
                element.style.left = `${50 + distance - 10}px`;
            });

            requestAnimationFrame(animatePlanets);
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (!isAnimating) {
                document.getElementById('playPause').textContent = '▶';
            } else {
                document.getElementById('playPause').textContent = '⏸';
            }
        }

        // Event Listeners
        document.getElementById('speedSlider').addEventListener('input', (e) => {
            speedMultiplier = e.target.value;
            elements.style.animationDuration = `${speedMultiplier}s`;
        });

        document.getElementById('playPause').addEventListener('click', toggleAnimation);

        // Create planets and UI elements
        createSolarSystem();
        animatePlanets();

        // Add starfield background
        const starField = document.getElementById('star-field');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.width = `${Math.random() * 3}px`;
            star.style.height = star.style.width;
            starField.appendChild(star);
        }
    </script>
</body>
</html>
