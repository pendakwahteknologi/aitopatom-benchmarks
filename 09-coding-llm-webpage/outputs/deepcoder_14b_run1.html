<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Solar System</title>
    <style>
        :root {
            --space-bg: #0a0a2e;
            --star-twinkle: 1s infinite;
        }

        body {
            margin: 0;
            overflow-x: hidden;
            background-color: var(--space-bg);
            font-family: Arial, sans-serif;
            color: white;
            position: relative;
        }

        .container {
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
        }

        #solar-system {
            position: relative;
            transform-style: preserve-3d;
            transition: all var(--star-twinkle);
        }

        .sun {
            width: 60px;
            height: 60px;
            background: radial-gradient(#ffd700, #ff8c00);
            border-radius: 50%;
            box-shadow: 0 0 30px #ff8c00;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .orbit {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform-style: preserve-3d;
            opacity: 0.3;
        }

        .info-card {
            position: fixed;
            bottom: 20px;
            right: -300px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .highlighted {
            transform: scale(1.2) !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .star-field {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--star-twinkle) ease-in-out infinite;
        }

        @keyframes twinkle {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
        }

        .side-panel {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
        }

        .planet-list {
            list-style-type: none;
            padding: 0;
        }

        .planet-name {
            cursor: pointer;
            color: #fff;
            transition: all 0.3s ease;
        }

        .planet-name:hover {
            color: #ff8c00;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="playPause">▶</button>
        <input type="range" id="speedControl" min="0.5" max="5" value="1">
        <button id="toggleView">Top View</button>
    </div>

    <ul class="planet-list side-panel"></ul>

    <div id="solar-system">
        <div class="sun"></div>
        <div class="star-field" id="stars"></div>
    </div>

    <div class="info-card" id="infoCard"></div>

    <script>
        const planetData = [
            { name: 'Mercury', color: '#888', size: 10, distance: 70, period: 4320 },
            { name: 'Venus', color: '#ffd700', size: 15, distance: 90, period: 7680 },
            { name: 'Earth', color: '#4169e1', size: 16, distance: 130, period: 10080 },
            { name: 'Mars', color: '#ff0000', size: 12, distance: 170, period: 12960 },
            { name: 'Jupiter', color: '#daa520', size: 30, distance: 240, period: 25920 },
            { name: 'Saturn', color: '#f4a460', size: 28, distance: 310, period: 37800 },
            { name: 'Uranus', color: '#00ffff', size: 22, distance: 350, period: 49200 },
            { name: 'Neptune', color: '#0000ff', size: 20, distance: 380, period: 61200 }
        ];

        let isAnimating = true;
        let animationSpeed = 1;

        function initPlanets() {
            const solarSystem = document.getElementById('solar-system');
            
            planetData.forEach((planet, index) => {
                // Create planet
                const planetDiv = document.createElement('div');
                planetDiv.className = 'planet';
                planetDiv.style.width = `${planet.size}px`;
                planetDiv.style.height = `${planet.size}px`;
                planetDiv.style.backgroundColor = planet.color;
                if (index === 4) { // Jupiter
                    planetDiv.style.borderRadius = '50% 50% 30% 30%'; // Slightly flattened for stripes
                }
                
                // Create orbit
                const orbitDiv = document.createElement('div');
                orbitDiv.className = 'orbit';
                orbitDiv.style.width = `${planet.distance * 2}px`;
                orbitDiv.style.height = `${planet.distance * 2}px`;
                orbitDiv.style.transform = `translate(-50%, -50%) rotateZ(90deg)`;
                
                // Position initial planet
                let angle = (Math.PI / 180) * ((index + 1) * 45);
                const x = Math.cos(angle) * planet.distance;
                const y = Math.sin(angle) * planet.distance;
                planetDiv.style.transform = `translate(${x}px, ${y}px)`;
                
                // Append to system
                orbitDiv.appendChild(planetDiv);
                solarSystem.appendChild(orbitDiv);

                // Add info card on click
                planetDiv.addEventListener('click', () => showInfo(planet));
            });
        }

        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 2}s`;
                starsContainer.appendChild(star);
            }
        }

        function showInfo(planet) {
            const infoCard = document.getElementById('infoCard');
            infoCard.innerHTML = `
                <h3>${planet.name}</h3>
                <p>Distance: ${planet.distance}px</p>
                <p>Orbital Period: ${planet.period / 60} minutes</p>
                <p>Fun Fact: One year on ${planet.name} lasts about ${Math.round(planet.period / 1440)} days!</p>
            `;
            infoCard.style.right = '20px';
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            const playPauseBtn = document.getElementById('playPause');
            playPauseBtn.innerHTML = isAnimating ? '⏸' : '▶';
        }

        function updateSpeed(speed) {
            animationSpeed = speed;
            // Adjust all planet periods based on new speed
            document.querySelectorAll('.orbit').forEach(orbit => {
                const currentDelay = orbit.style.animationDelay || 0;
                orbit.style.animationDelay = `${currentDelay * speed}`;
            });
        }

        function toggleView() {
            const solarSystem = document.getElementById('solar-system');
            solarSystem.classList.toggle('top-view', !solarSystem.classList.contains('top-view'));
        }

        // Event Listeners
        document.getElementById('playPause').addEventListener('click', () => {
            if (isAnimating) {
                cancelAnimationFrame(animationFrame);
                isAnimating = false;
            } else {
                animate();
            }
        });

        document.getElementById('speedControl').addEventListener('input', (e) => {
            updateSpeed(e.target.value);
        });

        document.getElementById('toggleView').addEventListener('click', () => {
            toggleView();
        });

        // Initialize
        initPlanets();
        createStars();

        // Animation loop
        let animationFrame;
        function animate() {
            if (!isAnimating) return;

            // Update planet positions
            const currentTime = Date.now() * animationSpeed;
            
            document.querySelectorAll('.orbit').forEach((orbit, index) => {
                const angle = (currentTime / 1000) % 360;
                orbit.style.transform = `rotateZ(${angle}deg)`;
            });

            animationFrame = requestAnimationFrame(animate);
        }

        // Start animation
        animate();

        // Responsive design
        window.addEventListener('resize', () => {
            const solarSystem = document.getElementById('solar-system');
            solarSystem.style.width = Math.min(window.innerWidth, 1000) + 'px';
        });
    </script>
</body>
</html>
