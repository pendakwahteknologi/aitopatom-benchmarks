<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Solar System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            perspective: 1200px;
        }

        #solarSystem {
            position: relative;
            width: 100vw;
            height: 100vh;
            transform-style: preserve-3d;
        }

        #stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration, 5s) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .sun {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ffd200, #ff8c00, #ff4500);
            border-radius: 50%;
            box-shadow: 0 0 50px #ff4500, 0 0 100px #ff8c00;
            z-index: 10;
            animation: sunGlow 3s infinite alternate;
        }

        @keyframes sunGlow {
            0% { box-shadow: 0 0 50px #ff4500, 0 0 100px #ff8c00; }
            100% { box-shadow: 0 0 70px #ff4500, 0 0 140px #ff8c00; }
        }

        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transform-style: preserve-3d;
        }

        .planet {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .planet:hover {
            transform: translate(-50%, -50%) scale(1.2);
            z-index: 20;
        }

        .planet-info {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            width: 200px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
            z-index: 30;
        }

        .planet-info.visible {
            opacity: 1;
        }

        .planet-info h3 {
            margin-bottom: 10px;
            color: #ffd200;
        }

        .planet-info p {
            margin: 5px 0;
            font-size: 14px;
        }

        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 15px;
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        #controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #controls input {
            width: 100%;
            margin: 10px 0;
        }

        #planetList {
            position: absolute;
            left: 20px;
            top: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 15px;
            backdrop-filter: blur(5px);
            max-height: 80vh;
            overflow-y: auto;
            z-index: 100;
        }

        #planetList h2 {
            margin-bottom: 10px;
            color: #ffd200;
        }

        #planetList ul {
            list-style: none;
        }

        #planetList li {
            padding: 8px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        #planetList li:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        #planetList li.active {
            background: rgba(255, 204, 0, 0.3);
            font-weight: bold;
        }

        .orbit-label {
            position: absolute;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            #controls, #planetList {
                position: relative;
                top: auto;
                right: auto;
                left: auto;
                width: 90%;
                margin: 10px auto;
                padding: 10px;
            }
            
            #planetList {
                max-height: 30vh;
            }
        }
    </style>
</head>
<body>
    <div id="solarSystem">
        <div id="stars"></div>
        <div class="sun"></div>
        <div id="controls">
            <button id="pauseBtn">Pause</button>
            <button id="viewBtn">Toggle View</button>
            <div>
                <label for="speedControl">Speed:</label>
                <input type="range" id="speedControl" min="0.5" max="5" step="0.1" value="1">
                <span id="speedValue">1x</span>
            </div>
        </div>
        <div id="planetList">
            <h2>Planets</h2>
            <ul id="planetListItems"></ul>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Create stars
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.width = `${Math.random() * 3}px`;
                star.style.height = star.style.width;
                star.style.setProperty('--duration', `${Math.random() * 5 + 3}s`);
                starsContainer.appendChild(star);
            }

            // Planet data
            const planets = [
                { name: "Mercury", size: 8, distance: 80, speed: 4.15, color: "#8C7853", period: 88, fact: "Mercury is the smallest planet and closest to the Sun." },
                { name: "Venus", size: 12, distance: 110, speed: 1.62, color: "#FFC649", period: 225, fact: "Venus rotates backwards compared to other planets." },
                { name: "Earth", size: 13, distance: 150, speed: 1, color: "#6B93D6", period: 365, fact: "Earth is the only planet known to support life." },
                { name: "Mars", size: 10, distance: 190, speed: 0.53, color: "#C1440E", period: 687, fact: "Mars has the largest volcano in the solar system." },
                { name: "Jupiter", size: 30, distance: 250, speed: 0.084, color: "#D8CA9D", period: 4333, fact: "Jupiter is a gas giant with over 80 moons." },
                { name: "Saturn", size: 25, distance: 320, speed: 0.034, color: "#E3E0C0", period: 10759, fact: "Saturn has prominent rings made of ice and rock." },
                { name: "Uranus", size: 18, distance: 380, speed: 0.012, color: "#D1E7E7", period: 30687, fact: "Uranus rotates on its side with an extreme tilt." },
                { name: "Neptune", size: 17, distance: 440, speed: 0.006, color: "#5B5DDF", period: 60190, fact: "Neptune has the strongest winds in the solar system." }
            ];

            // Create planets and orbits
            const solarSystem = document.getElementById('solarSystem');
            const planetList = document.getElementById('planetListItems');
            const pauseBtn = document.getElementById('pauseBtn');
            const viewBtn = document.getElementById('viewBtn');
            const speedControl = document.getElementById('speedControl');
            const speedValue = document.getElementById('speedValue');

            let isPaused = false;
            let isPerspective = true;
            let animationSpeed = 1;
            let animationId = null;

            // Create planet list
            planets.forEach((planet, index) => {
                const li = document.createElement('li');
                li.textContent = planet.name;
                li.dataset.index = index;
                li.addEventListener('click', () => {
                    highlightPlanet(index);
                });
                planetList.appendChild(li);
            });

            // Create orbits and planets
            planets.forEach((planet, index) => {
                // Create orbit
                const orbit = document.createElement('div');
                orbit.classList.add('orbit');
                orbit.style.width = `${planet.distance * 2}px`;
                orbit.style.height = `${planet.distance * 2}px`;
                solarSystem.appendChild(orbit);

                // Create planet
                const planetEl = document.createElement('div');
                planetEl.classList.add('planet');
                planetEl.dataset.index = index;
                planetEl.style.width = `${planet.size}px`;
                planetEl.style.height = `${planet.size}px`;
                planetEl.style.backgroundColor = planet.color;
                planetEl.style.left = `${planet.distance}px`;
                planetEl.style.top = '50%';
                planetEl.style.transform = `translate(-50%, -50%)`;
                planetEl.style.zIndex = 5;

                // Add Saturn's rings
                if (planet.name === "Saturn") {
                    const rings = document.createElement('div');
                    rings.style.position = 'absolute';
                    rings.style.width = `${planet.size * 2.5}px`;
                    rings.style.height = `${planet.size * 2.5}px`;
                    rings.style.border = '2px solid rgba(255, 255, 255, 0.5)';
                    rings.style.borderRadius = '50%';
                    rings.style.left = '50%';
                    rings.style.top = '50%';
                    rings.style.transform = 'translate(-50%, -50%)';
                    rings.style.zIndex = 4;
                    planetEl.appendChild(rings);
                }

                // Add planet info
                const info = document.createElement('div');
                info.classList.add('planet-info');
                info.innerHTML = `
                    <h3>${planet.name}</h3>
                    <p>Distance: ${planet.distance}px</p>
                    <p>Period: ${planet.period} days</p>
                    <p>${planet.fact}</p>
                `;
                planetEl.appendChild(info);

                // Add event listeners
                planetEl.addEventListener('mouseenter', () => {
                    planetEl.style.transform = `translate(-50%, -50%) scale(1.2)`;
                    planetEl.querySelector('.planet-info').classList.add('visible');
                });

                planetEl.addEventListener('mouseleave', () => {
                    planetEl.style.transform = `translate(-50%, -50%) scale(1)`;
                    planetEl.querySelector('.planet-info').classList.remove('visible');
                });

                planetEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    highlightPlanet(index);
                });

                orbit.appendChild(planetEl);
            });

            // Animation function
            function animate() {
                if (isPaused) return;
                
                const planets = document.querySelectorAll('.planet');
                planets.forEach((planet, index) => {
                    const orbit = planet.parentElement;
                    const planetData = planets[index];
                    const angle = (Date.now() * planetData.speed * animationSpeed) / 1000;
                    const x = Math.cos(angle) * planetData.distance;
                    const y = Math.sin(angle) * planetData.distance;
                    planet.style.left = `${x + planetData.distance}px`;
                    planet.style.top = `${y + 50}%`;
                });
                
                animationId = requestAnimationFrame(animate);
            }

            // Start animation
            animate();

            // Control functions
            pauseBtn.addEventListener('click', () => {
                isPaused = !isPaused;
                pauseBtn.textContent = isPaused ? 'Play' : 'Pause';
                if (!isPaused) animate();
            });

            viewBtn.addEventListener('click', () => {
                isPerspective = !isPerspective;
                const transformStyle = isPerspective ? 'preserve-3d' : 'flat';
                solarSystem.style.transformStyle = transformStyle;
                viewBtn.textContent = isPerspective ? 'Top View' : 'Perspective View';
            });

            speedControl.addEventListener('input', () => {
                animationSpeed = parseFloat(speedControl.value);
                speedValue.textContent = `${animationSpeed.toFixed(1)}x`;
            });

            // Highlight planet
            function highlightPlanet(index) {
                // Remove active class from all planets
                document.querySelectorAll('#planetList li').forEach(li => {
                    li.classList.remove('active');
                });
                
                // Add active class to clicked planet
                document.querySelectorAll('#planetList li')[index].classList.add('active');
                
                // Highlight planet
                const planet = document.querySelectorAll('.planet')[index];
                planet.style.transform = `translate(-50%, -50%) scale(1.5)`;
                planet.querySelector('.planet-info').classList.add('visible');
                
                // Reset after delay
                setTimeout(() => {
                    planet.style.transform = `translate(-50%, -50%) scale(1)`;
                }, 1000);
            }

            // Click outside to close info
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.planet')) {
                    document.querySelectorAll('.planet-info').forEach(info => {
                        info.classList.remove('visible');
                    });
                }
            });
        });
    </script>
</body>
</html>
